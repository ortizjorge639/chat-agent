# ══════════════════════════════════════════════════════════════
# Azure DevOps CI/CD Pipeline
# Builds the Python app and deploys to an existing App Service
# Target:  App Service 'app-contoso-dev' in 'rg-contoso-demo'
# ══════════════════════════════════════════════════════════════

trigger:
  - none
#   branches:
#     include:
#       - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  azureSubscription: 'azure-vs-enterprise'
  appServiceName: 'extron-data-bot-app'
  pythonVersion: '3.11'

stages:
# ══════════════════════════════════════════════════════════════
# STAGE 1: BUILD — Install deps + package the app
# ══════════════════════════════════════════════════════════════
- stage: Build
  displayName: 'Build & Package'
  jobs:
  - job: Package
    displayName: 'Package Python App'
    steps:

    - task: UsePythonVersion@0
      displayName: 'Use Python $(pythonVersion)'
      inputs:
        versionSpec: '$(pythonVersion)'

    - script: |
        python -m pip install --upgrade pip
        python -m venv antenv
        . antenv/bin/activate
        pip install --find-links wheels -r requirements.txt
        # App Service (Debian Bullseye) has glibc 2.31.
        # The build agent (Ubuntu 22.04+) has glibc 2.35, so pip downloads
        # manylinux_2_34 cryptography wheels that crash on App Service.
        # Fix: force-replace cryptography with the manylinux_2_28 wheel.
        pip download cryptography \
          --platform manylinux_2_28_x86_64 \
          --python-version 3.11 \
          --implementation cp \
          --only-binary=:all: \
          --no-deps \
          -d /tmp/crypto_fix
        pip install --force-reinstall --no-deps /tmp/crypto_fix/cryptography*.whl
      displayName: 'Install Python dependencies'
      workingDirectory: '$(Build.SourcesDirectory)/chat_agent'

    - task: ArchiveFiles@2
      displayName: 'Zip app into deployable package'
      inputs:
        rootFolderOrFile: '$(Build.SourcesDirectory)/chat_agent'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/app.zip'
        replaceExistingArchive: true

    - publish: '$(Build.ArtifactStagingDirectory)/app.zip'
      artifact: 'app-package'
      displayName: 'Publish app package'

# ══════════════════════════════════════════════════════════════
# STAGE 2: DEPLOY — Push to existing App Service
# ══════════════════════════════════════════════════════════════
- stage: Deploy
  displayName: 'Deploy Application'
  dependsOn: Build
  jobs:
  - job: DeployToAppService
    displayName: 'Deploy to App Service'
    steps:

    - download: current
      artifact: 'app-package'
      displayName: 'Download app package'

    - task: AzureWebApp@1
      displayName: 'Deploy to App Service (runFromPackage)'
      inputs:
        azureSubscription: $(azureSubscription)
        appType: 'webAppLinux'
        appName: $(appServiceName)
        package: '$(Pipeline.Workspace)/app-package/app.zip'
        runtimeStack: 'PYTHON|3.11'
        startUpCommand: 'python main_test.py'
        # Mounts the ZIP as read-only wwwroot instead of extracting.
        # Eliminates file-lock conflicts that cause 409 errors during ZIP Deploy.
        deploymentMethod: 'runFromPackage'
        appSettings: '-GENERATED_DIR /tmp/generated -SCM_DO_BUILD_DURING_DEPLOYMENT 0'
